<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Symmetrie-Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Symmetrie-Trainer</h1>
      <p>Wie viele Symmetrieachsen hat die Figur?</p>
    </header>

    <section class="status">
      <span>Richtig: <strong id="correct">0</strong> / 30</span>
      <span>Versuche: <strong id="tries">0</strong></span>
    </section>

    <section class="stage">
      <svg id="svg" viewBox="0 0 600 420" role="img" aria-label="Geometrische Figur auf Raster"></svg>
    </section>

    <section id="buttons" class="buttons" aria-label="Antworten">
      <button data-answer="0">0 Achsen</button>
      <button data-answer="1">1 Achse</button>
      <button data-answer="2">2 Achsen</button>
      <button data-answer="3">3 Achsen</button>
      <button data-answer="4">4 Achsen</button>
    </section>

    <section class="feedback">
      <div id="message">Wähle eine Antwort.</div>
      <button id="next" class="secondary" hidden>Nächste Figur</button>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
