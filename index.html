<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Symmetrieachsen – Grundschule</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Symmetrieachsen erkennen</h1>
      <p>Wie viele Symmetrieachsen hat die Figur?</p>
    </header>

    <section class="stats" aria-label="Spielstand">
      <div><strong id="correct">0</strong><span> richtig</span></div>
      <div><strong id="tries">0</strong><span> Versuche</span></div>
      <div><strong>30</strong><span> Ziel</span></div>
    </section>

    <section class="board">
      <svg id="svg" viewBox="0 0 600 420" role="img" aria-label="Geometrische Figur auf kariertem Raster"></svg>
    </section>

    <section class="controls" aria-label="Antworten">
      <button data-answer="0">0 Achsen</button>
      <button data-answer="1">1 Achse</button>
      <button data-answer="2">2 Achsen</button>
      <button data-answer="3">3 Achsen</button>
      <button data-answer="4">4 Achsen</button>
    </section>

    <p id="message" class="message">Wähle eine Antwort.</p>
    <button id="next" class="next" hidden>Nächste Figur</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
