<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Symmetrieachsen-Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Symmetrieachsen-Trainer</h1>
    <p class="lead">Wie viele Symmetrieachsen hat die Figur?</p>
    <section class="topbar">
      <span>Richtig: <strong id="correct">0</strong> / 30</span>
      <span>Versuche: <strong id="tries">0</strong></span>
      <span id="modeLabel">Aufgabe</span>
    </section>
    <svg id="svg" viewBox="0 0 600 420" aria-label="Geometrische Figur"></svg>
    <div class="buttons">
      <button data-answer="0">0 Achsen</button>
      <button data-answer="1">1 Achse</button>
      <button data-answer="2">2 Achsen</button>
      <button data-answer="3">3 Achsen</button>
      <button data-answer="4">4 Achsen</button>
    </div>
    <p id="message">Wähle eine Antwort.</p>
    <button id="next" hidden>Nächste Figur</button>
  </main>
  <script src="script.js"></script>
</body>
</html>
