<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Symmetrie-Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Symmetrie-Trainer</h1>
    <p class="intro">Wie viele Symmetrieachsen hat die Figur?</p>

    <section class="card">
      <div class="topbar">
        <button id="newTask">Neue Aufgabe</button>
        <div id="taskName" class="taskName">Figur</div>
      </div>

      <svg id="drawing" viewBox="0 0 600 420" aria-label="Geometrische Figur mit kariertem Raster">
        <defs>
          <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#d9e3ef" stroke-width="1"/>
          </pattern>
          <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
            <rect width="100" height="100" fill="url(#smallGrid)"/>
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#aebfd3" stroke-width="1.4"/>
          </pattern>
        </defs>
        <rect width="600" height="420" fill="url(#grid)" />
        <g id="shapeLayer"></g>
        <g id="axisLayer" class="hiddenAxes"></g>
      </svg>

      <div class="answers" aria-label="Antworten">
        <button data-answer="0">0</button>
        <button data-answer="1">1</button>
        <button data-answer="2">2</button>
        <button data-answer="3">3</button>
        <button data-answer="4">4</button>
      </div>

      <div id="feedback" class="feedback">Wähle eine Antwort.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
